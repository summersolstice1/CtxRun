<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>CtxRun Transfer</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b1220;
        --panel: rgba(15, 23, 42, 0.92);
        --line: rgba(148, 163, 184, 0.18);
        --text: #e2e8f0;
        --muted: #94a3b8;
        --accent: #38bdf8;
        --accent-soft: rgba(56, 189, 248, 0.16);
        --bubble-in: rgba(30, 41, 59, 0.94);
        --bubble-out: rgba(14, 165, 233, 0.18);
        --danger: #f87171;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        background:
          radial-gradient(circle at top, rgba(56, 189, 248, 0.16), transparent 40%),
          linear-gradient(180deg, #0f172a 0%, var(--bg) 100%);
        color: var(--text);
      }

      .app {
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr auto;
      }

      header {
        padding: 18px 18px 12px;
        border-bottom: 1px solid var(--line);
        background: rgba(2, 6, 23, 0.72);
        backdrop-filter: blur(18px);
      }

      header h1 {
        margin: 0;
        font-size: 18px;
      }

      header p {
        margin: 6px 0 0;
        font-size: 12px;
        color: var(--muted);
      }

      #messages {
        padding: 18px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        overflow-y: auto;
      }

      .bubble {
        max-width: 85%;
        padding: 12px 14px;
        border-radius: 16px;
        border: 1px solid var(--line);
        background: var(--bubble-in);
        align-self: flex-start;
        word-break: break-word;
        box-shadow: 0 10px 30px rgba(2, 6, 23, 0.2);
      }

      .bubble.outgoing {
        align-self: flex-end;
        background: var(--bubble-out);
      }

      .bubble.system {
        max-width: 100%;
        align-self: center;
        background: transparent;
        border: 0;
        color: var(--muted);
        padding: 4px 8px;
        font-size: 12px;
      }

      .meta {
        margin-top: 8px;
        font-size: 11px;
        color: var(--muted);
      }

      .file-card {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .file-actions {
        display: flex;
        gap: 8px;
      }

      .file-actions a,
      .file-actions button,
      #sendBtn,
      #pinSubmit {
        appearance: none;
        border: 1px solid transparent;
        border-radius: 12px;
        padding: 10px 14px;
        background: var(--accent);
        color: #082f49;
        font-weight: 700;
        text-decoration: none;
      }

      .file-actions button.secondary,
      #attachBtn {
        background: transparent;
        color: var(--text);
        border-color: var(--line);
      }

      .composer {
        display: grid;
        grid-template-columns: 1fr auto auto;
        gap: 10px;
        padding: 16px 18px calc(16px + env(safe-area-inset-bottom));
        border-top: 1px solid var(--line);
        background: rgba(2, 6, 23, 0.84);
        backdrop-filter: blur(18px);
      }

      textarea,
      input[type="password"] {
        width: 100%;
        border-radius: 14px;
        border: 1px solid var(--line);
        background: rgba(15, 23, 42, 0.9);
        color: var(--text);
        padding: 12px 14px;
        font: inherit;
      }

      textarea {
        min-height: 48px;
        max-height: 140px;
        resize: vertical;
      }

      .hidden {
        display: none !important;
      }

      #pinGate {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background: rgba(2, 6, 23, 0.82);
        backdrop-filter: blur(18px);
        padding: 20px;
      }

      #pinCard {
        width: min(100%, 360px);
        border-radius: 20px;
        padding: 18px;
        background: var(--panel);
        border: 1px solid var(--line);
        box-shadow: 0 20px 50px rgba(2, 6, 23, 0.42);
      }

      #pinError {
        min-height: 20px;
        margin: 8px 0 0;
        color: var(--danger);
        font-size: 12px;
      }

      progress {
        width: 100%;
        height: 8px;
      }

      #statusDot {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: #f59e0b;
        margin-right: 6px;
      }

      #statusDot.ready {
        background: #22c55e;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header>
        <h1>CtxRun Transfer</h1>
        <p><span id="statusDot"></span><span id="statusText">Connecting…</span></p>
      </header>

      <main id="messages"></main>

      <div class="composer">
        <textarea id="composerInput" placeholder="Type a message..."></textarea>
        <button id="attachBtn" class="secondary" type="button">Attach</button>
        <button id="sendBtn" type="button">Send</button>
        <input id="fileInput" class="hidden" type="file" />
      </div>
    </div>

    <div id="pinGate" class="hidden">
      <div id="pinCard">
        <h2 style="margin: 0 0 10px; font-size: 18px">PIN Required</h2>
        <p style="margin: 0 0 12px; color: var(--muted); font-size: 13px">
          Enter the PIN shown on the CtxRun desktop to join this transfer session.
        </p>
        <input id="pinInput" type="password" inputmode="numeric" placeholder="PIN" />
        <button id="pinSubmit" type="button" style="margin-top: 12px; width: 100%">Connect</button>
        <div id="pinError"></div>
      </div>
    </div>

    <script>
      const bootstrap = {
        wsPath: "__WS_PATH__",
        pinRequired: __PIN_REQUIRED__,
        cookieName: "__COOKIE_NAME__",
      };

      const messagesEl = document.getElementById("messages");
      const inputEl = document.getElementById("composerInput");
      const sendBtn = document.getElementById("sendBtn");
      const attachBtn = document.getElementById("attachBtn");
      const fileInput = document.getElementById("fileInput");
      const statusText = document.getElementById("statusText");
      const statusDot = document.getElementById("statusDot");
      const pinGate = document.getElementById("pinGate");
      const pinInput = document.getElementById("pinInput");
      const pinSubmit = document.getElementById("pinSubmit");
      const pinError = document.getElementById("pinError");

      const state = {
        ws: null,
        deviceId: null,
        sessionToken: null,
        pin: "",
      };

      function nowLabel(timestampMs) {
        const date = new Date(timestampMs || Date.now());
        return date.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
      }

      function appendSystem(text) {
        const bubble = document.createElement("div");
        bubble.className = "bubble system";
        bubble.textContent = text;
        messagesEl.appendChild(bubble);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      function appendTextMessage(text, outgoing, timestampMs) {
        const bubble = document.createElement("div");
        bubble.className = `bubble ${outgoing ? "outgoing" : ""}`.trim();
        bubble.textContent = text;
        const meta = document.createElement("div");
        meta.className = "meta";
        meta.textContent = nowLabel(timestampMs);
        bubble.appendChild(meta);
        messagesEl.appendChild(bubble);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      function appendFileOffer(fileName, fileSize, downloadUrl) {
        const bubble = document.createElement("div");
        bubble.className = "bubble";
        const card = document.createElement("div");
        card.className = "file-card";
        const title = document.createElement("div");
        title.textContent = fileName;
        const meta = document.createElement("div");
        meta.className = "meta";
        meta.textContent = `${(fileSize / 1024 / 1024).toFixed(2)} MB`;
        const actions = document.createElement("div");
        actions.className = "file-actions";
        const link = document.createElement("a");
        link.href = downloadUrl;
        link.textContent = "Download";
        link.download = fileName;
        actions.appendChild(link);
        card.appendChild(title);
        card.appendChild(meta);
        card.appendChild(actions);
        bubble.appendChild(card);
        messagesEl.appendChild(bubble);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      function setReady(ready, text) {
        statusDot.classList.toggle("ready", ready);
        statusText.textContent = text;
      }

      function setCookie(value) {
        document.cookie = `${bootstrap.cookieName}=${value}; path=/; max-age=3600; SameSite=Strict`;
      }

      function connect() {
        const scheme = location.protocol === "https:" ? "wss" : "ws";
        const wsUrl = `${scheme}://${location.host}${bootstrap.wsPath}`;
        state.ws = new WebSocket(wsUrl);

        state.ws.addEventListener("open", () => {
          if (bootstrap.pinRequired) {
            pinGate.classList.remove("hidden");
            pinInput.focus();
            return;
          }
          sendHello("");
        });

        state.ws.addEventListener("message", (event) => {
          const message = JSON.parse(event.data);
          switch (message.type) {
            case "session":
              state.deviceId = message.deviceId;
              state.sessionToken = message.sessionToken;
              setCookie(message.sessionToken);
              pinGate.classList.add("hidden");
              pinError.textContent = "";
              setReady(true, `Connected as ${message.deviceName}`);
              appendSystem("Connected to CtxRun");
              break;
            case "chat":
              appendTextMessage(message.content, false, message.timestampMs);
              break;
            case "file_offer":
              appendFileOffer(message.fileName, message.fileSize, message.downloadUrl);
              break;
            case "error":
              pinError.textContent = message.message || "Failed to connect.";
              appendSystem(message.message || "Error");
              break;
            case "system":
              appendSystem(message.content);
              break;
            default:
              break;
          }
        });

        state.ws.addEventListener("close", () => {
          setReady(false, "Disconnected");
          appendSystem("Connection closed");
        });
      }

      function sendHello(pin) {
        if (!state.ws || state.ws.readyState !== WebSocket.OPEN) return;
        state.ws.send(
          JSON.stringify({
            type: "hello",
            userAgent: navigator.userAgent,
            pin: pin || undefined,
          })
        );
      }

      function sendMessage() {
        const value = inputEl.value.trim();
        if (!value || !state.ws || state.ws.readyState !== WebSocket.OPEN) return;
        state.ws.send(JSON.stringify({ type: "chat", content: value }));
        appendTextMessage(value, true, Date.now());
        inputEl.value = "";
      }

      function uploadFile(file) {
        if (!file || !state.deviceId || !state.sessionToken) return;
        const formData = new FormData();
        formData.append("file", file);

        const bubble = document.createElement("div");
        bubble.className = "bubble outgoing";
        bubble.innerHTML = `
          <div class="file-card">
            <div>${file.name}</div>
            <div class="meta">Uploading…</div>
            <progress max="100" value="0"></progress>
          </div>
        `;
        const progressEl = bubble.querySelector("progress");
        const metaEl = bubble.querySelector(".meta");
        messagesEl.appendChild(bubble);
        messagesEl.scrollTop = messagesEl.scrollHeight;

        const xhr = new XMLHttpRequest();
        xhr.open("POST", `/api/upload/${encodeURIComponent(state.deviceId)}`);
        xhr.setRequestHeader("x-ctxrun-file-size", String(file.size));
        xhr.upload.addEventListener("progress", (event) => {
          if (!event.lengthComputable) return;
          const percent = Math.round((event.loaded / event.total) * 100);
          progressEl.value = percent;
          metaEl.textContent = `Uploading… ${percent}%`;
        });
        xhr.addEventListener("load", () => {
          progressEl.value = 100;
          metaEl.textContent = xhr.status >= 200 && xhr.status < 300 ? "Uploaded" : "Upload failed";
        });
        xhr.addEventListener("error", () => {
          metaEl.textContent = "Upload failed";
        });
        xhr.send(formData);
      }

      sendBtn.addEventListener("click", sendMessage);
      inputEl.addEventListener("keydown", (event) => {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          sendMessage();
        }
      });
      attachBtn.addEventListener("click", () => fileInput.click());
      fileInput.addEventListener("change", (event) => {
        const [file] = event.target.files || [];
        uploadFile(file);
        fileInput.value = "";
      });
      pinSubmit.addEventListener("click", () => {
        const pin = pinInput.value.trim();
        state.pin = pin;
        sendHello(pin);
      });

      connect();
    </script>
  </body>
</html>
