<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=0" />
  <title>CtxRun Transfer</title>
  <style>
    /* 自动适配白天/黑夜模式的极简配色系统 */
    :root {
      --bg: #f3f4f6;
      --surface: #ffffff;
      --border: #e5e7eb;
      --text: #111827;
      --muted: #6b7280;
      --primary: #2563eb;
      --primary-fg: #ffffff;
      --bubble-in: #ffffff;
      --bubble-out: #2563eb;
      --bubble-out-text: #ffffff;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f111a;
        --surface: #1e2230;
        --border: #2a2f40;
        --text: #f3f4f6;
        --muted: #9ca3af;
        --primary: #3b82f6;
        --bubble-in: #1e2230;
      }
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg); color: var(--text); overflow: hidden;
    }

    .app { display: flex; flex-direction: column; height: 100%; }

    /* 顶部导航栏 */
    header {
      flex-shrink: 0; height: 50px; background: var(--surface); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; padding: 0 16px; padding-top: env(safe-area-inset-top);
      z-index: 10;
    }
    .header-title { font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #f59e0b; }
    .status-dot.ready { background: #10b981; }

    /* 消息区域 */
    main {
      flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 16px;
      -webkit-overflow-scrolling: touch;
    }
    .system-msg {
      align-self: center; font-size: 11px; color: var(--muted); background: var(--border); padding: 4px 12px; border-radius: 12px;
    }
    .bubble-wrapper { display: flex; flex-direction: column; width: 100%; }
    .bubble-wrapper.out { align-items: flex-end; }
    .bubble-wrapper.in { align-items: flex-start; }
    
    .bubble {
      max-width: 80%; padding: 10px 14px; font-size: 15px; line-height: 1.5; word-wrap: break-word;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }
    .bubble.in { background: var(--bubble-in); color: var(--text); border-radius: 16px 16px 16px 4px; border: 1px solid var(--border); }
    .bubble.out { background: var(--bubble-out); color: var(--bubble-out-text); border-radius: 16px 16px 4px 16px; }
    .time { font-size: 10px; color: var(--muted); margin-top: 4px; margin-bottom: 4px; }

    /* 文件卡片 */
    .file-card { display: flex; flex-direction: column; gap: 8px; min-width: 160px; }
    .file-name { font-weight: 500; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .file-meta { font-size: 12px; opacity: 0.8; }
    .file-dl { margin-top: 4px; padding: 6px 0; background: rgba(255,255,255,0.2); text-align: center; border-radius: 8px; color: inherit; text-decoration: none; font-size: 13px; }
    progress { width: 100%; height: 4px; appearance: none; border: none; border-radius: 2px; overflow: hidden; }
    progress::-webkit-progress-bar { background: rgba(0,0,0,0.2); }
    progress::-webkit-progress-value { background: #fff; }

    /* 底部输入区 */
    footer {
      flex-shrink: 0; background: var(--surface); border-top: 1px solid var(--border);
      padding: 8px 12px calc(8px + env(safe-area-inset-bottom));
      display: flex; align-items: flex-end; gap: 10px;
    }
    .btn-icon {
      width: 36px; height: 36px; border-radius: 50%; border: none; background: transparent; color: var(--muted);
      font-size: 24px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .input-box {
      flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 20px;
      padding: 8px 14px; font-size: 15px; color: var(--text); resize: none; max-height: 100px;
      outline: none; overflow-y: auto;
    }
    .btn-send {
      width: 64px; height: 36px; border-radius: 18px; border: none; background: var(--primary); color: white;
      font-size: 14px; font-weight: 600; flex-shrink: 0; transition: opacity 0.2s;
    }
    .btn-send:disabled { opacity: 0.5; }

    /* 鉴权遮罩 */
    #pinGate {
      position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100;
      display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .pin-card { background: var(--surface); padding: 24px; border-radius: 16px; width: 100%; max-width: 320px; text-align: center; }
    .pin-card input { width: 100%; padding: 12px; margin: 16px 0; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 16px; text-align: center; outline: none; }
    .pin-card button { width: 100%; padding: 12px; border-radius: 8px; background: var(--primary); color: white; border: none; font-size: 16px; font-weight: 600; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="header-title">
        <span id="statusDot" class="status-dot"></span>
        <span id="headerText">CtxRun Transfer</span>
      </div>
    </header>

    <main id="messages">
       <div class="system-msg">Session Started</div>
    </main>

    <footer>
      <button class="btn-icon" id="attachBtn" aria-label="Attach File">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 18 8.84l-8.59 8.57a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
      </button>
      <textarea class="input-box" id="composerInput" rows="1" placeholder="Message..."></textarea>
      <button class="btn-send" id="sendBtn" disabled>Send</button>
      <input id="fileInput" class="hidden" type="file" multiple />
    </footer>
  </div>

  <div id="pinGate" class="hidden">
    <div class="pin-card">
      <h2 style="margin:0 0 8px; font-size: 20px;">PIN Required</h2>
      <p style="margin:0; font-size: 13px; color: var(--muted);">Check your PC for the PIN code.</p>
      <input id="pinInput" type="number" placeholder="Enter PIN" />
      <button id="pinSubmit">Connect</button>
      <div id="pinError" style="color: var(--danger); font-size: 12px; margin-top: 12px; min-height: 14px;"></div>
    </div>
  </div>

  <script>
    const bootstrap = { wsPath: "__WS_PATH__", pinRequired: __PIN_REQUIRED__, cookieName: "__COOKIE_NAME__" };
    const els = {
      msgs: document.getElementById('messages'),
      input: document.getElementById('composerInput'),
      send: document.getElementById('sendBtn'),
      attach: document.getElementById('attachBtn'),
      fileInput: document.getElementById('fileInput'),
      statusDot: document.getElementById('statusDot'),
      headerText: document.getElementById('headerText'),
      pinGate: document.getElementById('pinGate'),
      pinInput: document.getElementById('pinInput'),
      pinSubmit: document.getElementById('pinSubmit'),
      pinError: document.getElementById('pinError')
    };

    const state = { ws: null, deviceId: null, reconnectTimer: null };

    // 输入框自动撑高
    els.input.addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = (this.scrollHeight) + 'px';
      els.send.disabled = this.value.trim().length === 0;
    });

    function formatTime(ts) {
      return new Date(ts || Date.now()).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function scrollToBottom() {
      els.msgs.scrollTop = els.msgs.scrollHeight;
    }

    function appendSysMsg(text) {
      const el = document.createElement('div');
      el.className = 'system-msg';
      el.textContent = text;
      els.msgs.appendChild(el);
      scrollToBottom();
    }

    function appendMsg(text, isOut, ts) {
      const wrapper = document.createElement('div');
      wrapper.className = `bubble-wrapper ${isOut ? 'out' : 'in'}`;
      
      const bubble = document.createElement('div');
      bubble.className = `bubble ${isOut ? 'out' : 'in'}`;
      bubble.textContent = text;
      
      const time = document.createElement('div');
      time.className = 'time';
      time.textContent = formatTime(ts);
      
      wrapper.appendChild(bubble);
      wrapper.appendChild(time);
      els.msgs.appendChild(wrapper);
      scrollToBottom();
    }

    function appendFile(name, size, url) {
      const wrapper = document.createElement('div');
      wrapper.className = 'bubble-wrapper in';
      const bubble = document.createElement('div');
      bubble.className = 'bubble in';
      
      bubble.innerHTML = `
        <div class="file-card">
          <div class="file-name">${name}</div>
          <div class="file-meta">${(size/1024/1024).toFixed(2)} MB</div>
          <a class="file-dl" href="${url}" download="${name}">Download</a>
        </div>
      `;
      wrapper.appendChild(bubble);
      els.msgs.appendChild(wrapper);
      scrollToBottom();
    }

    function connect() {
      const protocol = location.protocol === 'https:' ? 'wss' : 'ws';
      state.ws = new WebSocket(`${protocol}://${location.host}${bootstrap.wsPath}`);

      state.ws.onopen = () => {
        if (bootstrap.pinRequired) {
          els.pinGate.classList.remove('hidden');
        } else {
          sendHello();
        }
      };

      state.ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        switch (msg.type) {
          case 'session':
            state.deviceId = msg.deviceId;
            document.cookie = `${bootstrap.cookieName}=${msg.sessionToken}; path=/; max-age=3600; SameSite=Strict`;
            els.pinGate.classList.add('hidden');
            els.statusDot.classList.add('ready');
            els.headerText.textContent = "Connected";
            break;
          case 'chat': appendMsg(msg.content, false, msg.timestampMs); break;
          case 'file_offer': appendFile(msg.fileName, msg.fileSize, msg.downloadUrl); break;
          case 'error': els.pinError.textContent = msg.message; break;
          case 'system': appendSysMsg(msg.content); break;
        }
      };

      state.ws.onclose = () => {
        els.statusDot.classList.remove('ready');
        els.headerText.textContent = "Disconnected";
        // 断线重连机制
        clearTimeout(state.reconnectTimer);
        state.reconnectTimer = setTimeout(connect, 3000);
      };
    }

    function sendHello(pin) {
      state.ws.send(JSON.stringify({ type: "hello", userAgent: navigator.userAgent, pin }));
    }

    function handleSend() {
      const val = els.input.value.trim();
      if (!val || state.ws.readyState !== WebSocket.OPEN) return;
      state.ws.send(JSON.stringify({ type: "chat", content: val }));
      appendMsg(val, true);
      els.input.value = '';
      els.input.style.height = 'auto';
      els.send.disabled = true;
    }

    function uploadFile(file) {
      if (!file || !state.deviceId) return;
      const fd = new FormData();
      fd.append("file", file);

      const wrapper = document.createElement('div');
      wrapper.className = 'bubble-wrapper out';
      const bubble = document.createElement('div');
      bubble.className = 'bubble out';
      bubble.innerHTML = `
        <div class="file-card">
          <div class="file-name">${file.name}</div>
          <div class="file-meta upload-status">Uploading...</div>
          <progress max="100" value="0"></progress>
        </div>
      `;
      wrapper.appendChild(bubble);
      els.msgs.appendChild(wrapper);
      scrollToBottom();

      const prog = bubble.querySelector('progress');
      const stat = bubble.querySelector('.upload-status');

      const xhr = new XMLHttpRequest();
      xhr.open("POST", `/api/upload/${encodeURIComponent(state.deviceId)}`);
      xhr.setRequestHeader("x-ctxrun-file-size", String(file.size));
      xhr.upload.onprogress = e => {
        if(e.lengthComputable) {
          const pct = Math.round((e.loaded / e.total) * 100);
          prog.value = pct; stat.textContent = `Uploading ${pct}%`;
        }
      };
      xhr.onload = () => { prog.value = 100; stat.textContent = "Sent"; };
      xhr.onerror = () => { stat.textContent = "Failed"; };
      xhr.send(fd);
    }

    els.send.onclick = handleSend;
    els.attach.onclick = () => els.fileInput.click();
    els.fileInput.onchange = e => {
      Array.from(e.target.files).forEach(uploadFile);
      els.fileInput.value = '';
    };
    els.pinSubmit.onclick = () => sendHello(els.pinInput.value);

    connect();
  </script>
</body>
</html>
