name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  frontend-checks:
    name: Frontend Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run frontend tests with coverage gate
        run: npm run test:coverage

  rust-checks:
    name: Rust Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run centralized Rust tests
        run: cargo test -p ctxrun-workspace-tests

      - name: Check centralized Rust test crate
        run: cargo check -p ctxrun-workspace-tests

      - name: Check core Rust plugin crates
        run: cargo check -p ctxrun-plugin-automator -p ctxrun-plugin-context -p ctxrun-plugin-git -p ctxrun-plugin-miner -p ctxrun-plugin-refinery

      - name: Enforce Rust coverage gate
        run: cargo llvm-cov -p ctxrun-workspace-tests --summary-only --fail-under-lines 40
