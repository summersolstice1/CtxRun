name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  frontend-checks:
    name: Frontend Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run frontend tests with coverage gate
        run: npm run test:coverage

  rust-checks:
    name: Rust Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies (GLib/GTK/WebKit)
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libglib2.0-dev libgtk-3-dev librsvg2-dev patchelf
          sudo apt-get install -y libwebkit2gtk-4.1-dev || sudo apt-get install -y libwebkit2gtk-4.0-dev
          sudo apt-get install -y libayatana-appindicator3-dev || sudo apt-get install -y libappindicator3-dev
          sudo apt-get install -y libpipewire-0.3-dev libspa-0.2-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run centralized Rust tests
        run: cargo test -p ctxrun-workspace-tests -p ctxrun-db -p ctxrun-plugin-context -p ctxrun-plugin-git -p ctxrun-plugin-refinery

      - name: Check centralized Rust test crate
        run: cargo check -p ctxrun-workspace-tests

      - name: Check core Rust plugin crates
        run: cargo check -p ctxrun-plugin-automator -p ctxrun-plugin-context -p ctxrun-plugin-git -p ctxrun-plugin-miner -p ctxrun-plugin-refinery

      - name: Enforce Rust coverage gate
        run: cargo llvm-cov -p ctxrun-workspace-tests -p ctxrun-db -p ctxrun-plugin-context -p ctxrun-plugin-git -p ctxrun-plugin-refinery -p ctxrun-plugin-tool-runtime --fail-under-lines 70
