name: Release App

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create_release.outputs.id }}

    steps:
      - uses: actions/checkout@v4

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: true
          prerelease: false
          generate_release_notes: true

  build-tauri:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target universal-apple-darwin'
          - platform: 'ubuntu-24.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    
    permissions:
      contents: write
      
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            libclang-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libpipewire-0.3-dev \
            libspa-0.2-dev \
            libgbm-dev \
            libxkbcommon-dev \
            libdbus-1-dev \
            libx11-dev \
            libxtst-dev \
            libxdo-dev \
            libxcomposite-dev \
            libxdamage-dev \
            libxrandr-dev \
            libasound2-dev

      - name: Install LLVM (macOS only)
        if: matrix.platform == 'macos-latest'
        run: brew install llvm

      - name: Install LLVM (Windows only)
        if: matrix.platform == 'windows-latest'
        run: choco install llvm --yes

      - name: Configure libclang
        shell: bash
        run: |
          case "${{ matrix.platform }}" in
            ubuntu-24.04)
              echo "LIBCLANG_PATH=/usr/lib/llvm-18/lib" >> "$GITHUB_ENV"
              echo "CLANG_PATH=/usr/bin/clang" >> "$GITHUB_ENV"
              ;;
            macos-latest)
              LLVM_PREFIX="$(brew --prefix llvm)"
              echo "LIBCLANG_PATH=${LLVM_PREFIX}/lib" >> "$GITHUB_ENV"
              echo "CLANG_PATH=${LLVM_PREFIX}/bin/clang" >> "$GITHUB_ENV"
              ;;
            windows-latest)
              echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> "$GITHUB_ENV"
              echo "CLANG_PATH=C:\Program Files\LLVM\bin\clang.exe" >> "$GITHUB_ENV"
              ;;
          esac

      - name: Install frontend dependencies
        run: npm install

      - name: Build and Upload
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}
          projectPath: "./src-tauri"
          tagName: v${{ github.ref_name }}
